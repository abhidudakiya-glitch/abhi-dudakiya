            color: #e2e8f0;

                url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='rgba(255, 255, 255, 0.05)' stroke-width='1.5' stroke-linejoin='round' stroke-linecap='round'%3E%3Cpath d='M15,25 h6 l2,-3 h6 l2,3 h6 v15 h-22 z' /%3E%3Ccircle cx='26' cy='32' r='4' /%3E%3Ccircle cx='33' cy='27' r='1' /%3E%3Crect x='70' y='20' width='24' height='14' rx='1' /%3E%3Cpath d='M66,36 h32 v2 h-32 z' /%3E%3Cpath d='M80,36 v-2' /%3E%3Crect x='20' y='70' width='28' height='18' rx='1' /%3E%3Cpath d='M34,88 v6' /%3E%3Cpath d='M26,94 h16 v2 h-16 z' /%3E%3Cpath d='M75,75 h14 v12 h-14 z' /%3E%3Cpath d='M89,78 l8,-4 v14 l-8,-4' /%3E%3Ccircle cx='80' cy='81' r='3' /%3E%3C/g%3E%3C/svg%3E");
            background-size: 100% 100vh, 120px 120px;
            background-attachment: fixed;
        }
        
        .dome-gallery-section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <nav>

            <svg class="menu-icon-bars" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>

    <section class="dome-gallery-section">
        <div id="dome-gallery-root" class="sphere-root" style="--segments-x: 35; --segments-y: 35; --overlay-blur-color: #0b0c10; --tile-radius: 30px; --enlarge-radius: 30px; --image-filter: grayscale(0);">
            <main id="dome-main" class="sphere-main">
                <div class="stage">
                    <div id="dome-sphere" class="sphere"></div>
                </div>
                <div class="overlay"></div>
                <div class="overlay overlay--blur"></div>
                <div class="edge-fade edge-fade--top"></div>
                <div class="edge-fade edge-fade--bottom"></div>
                <div id="dome-viewer" class="viewer">
                    <div id="dome-scrim" class="scrim"></div>
                    <div id="dome-frame" class="frame"></div>
                </div>
            </main>
        </div>
    </section>
